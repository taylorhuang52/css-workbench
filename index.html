<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS 工作台｜邊寫邊看的 CSS 練習場</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">

<style>
:root{
  --bg:#14152b;
  --surface:#1b1d3a;
  --surface-2:#232650;
  --border:#33366a;
  --text:#eae8f5;
  --text-muted:#9491b8;
  --accent:#7c9eff;
  --accent-dim:#5b74c4;
  --accent-warm:#ffb86b;
  --mono:'JetBrains Mono',monospace;
  --display:'Space Grotesk',sans-serif;
  --body:'Inter',sans-serif;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:var(--body);
  overflow:hidden;
}

/* ---------- Header ---------- */
.app{
  display:grid;
  grid-template-rows:auto 1fr;
  height:100vh;
}
header{
  display:flex;
  align-items:center;
  gap:16px;
  padding:14px 22px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,#191a35,#14152b);
}
.cascade-mark{
  position:relative;
  width:34px;height:28px;
  flex-shrink:0;
}
.cascade-mark span{
  position:absolute;
  left:0;
  width:100%;
  height:8px;
  border-radius:2px;
  opacity:0;
  animation:drop .6s ease forwards;
}
.cascade-mark span:nth-child(1){top:0;background:var(--accent);animation-delay:.05s;}
.cascade-mark span:nth-child(2){top:10px;background:var(--accent-dim);animation-delay:.2s;}
.cascade-mark span:nth-child(3){top:20px;background:var(--accent-warm);animation-delay:.35s;}
@keyframes drop{
  from{transform:translateY(-14px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}
.brand{display:flex;flex-direction:column;line-height:1.15;}
.brand b{font-family:var(--display);font-size:19px;font-weight:700;letter-spacing:.2px;}
.brand small{color:var(--text-muted);font-size:12.5px;}
.header-spacer{flex:1;}
.width-control{
  display:flex;align-items:center;gap:10px;
  font-family:var(--mono);font-size:12px;color:var(--text-muted);
}
.width-control input[type=range]{accent-color:var(--accent);width:120px;}
.width-control b{color:var(--accent);font-weight:500;}

/* ---------- Layout ---------- */
.layout{
  display:grid;
  grid-template-columns:230px 1fr 1fr;
  min-height:0;
}
@media (max-width:1050px){
  .layout{grid-template-columns:200px 1fr;}
  .preview-col{grid-column:1/3;grid-row:2;border-top:1px solid var(--border);}
}
@media (max-width:720px){
  body{overflow:auto;}
  .app{height:auto;min-height:100vh;}
  .layout{grid-template-columns:1fr;}
  .sidebar{grid-row:1;display:flex;overflow-x:auto;padding:10px;gap:8px;}
  .sidebar .lesson-btn{white-space:nowrap;}
  .editor-col{grid-row:2;}
  .preview-col{grid-column:1;grid-row:3;}
  .editor-pane{height:260px;}
}

/* ---------- Sidebar ---------- */
.sidebar{
  border-right:1px solid var(--border);
  padding:14px 10px;
  overflow-y:auto;
  background:var(--surface);
}
.sidebar-title{
  font-size:11px;
  letter-spacing:1.2px;
  text-transform:uppercase;
  color:var(--text-muted);
  padding:4px 8px 10px;
}
.lesson-btn{
  display:block;
  width:100%;
  text-align:left;
  background:transparent;
  border:1px solid transparent;
  color:var(--text-muted);
  padding:9px 10px;
  border-radius:8px;
  font-family:var(--body);
  font-size:13.5px;
  cursor:pointer;
  margin-bottom:2px;
  transition:background .15s,color .15s,border-color .15s;
}
.lesson-btn .num{
  font-family:var(--mono);
  color:var(--accent-dim);
  margin-right:8px;
  font-size:12px;
}
.lesson-btn:hover{background:var(--surface-2);color:var(--text);}
.lesson-btn.active{
  background:var(--surface-2);
  border-color:var(--border);
  color:var(--text);
  font-weight:600;
}
.lesson-btn.active .num{color:var(--accent);}

/* ---------- Editor column ---------- */
.editor-col{
  display:flex;
  flex-direction:column;
  min-height:0;
  border-right:1px solid var(--border);
}
.editor-pane{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  border-bottom:1px solid var(--border);
}
.editor-pane:last-child{border-bottom:none;}
.pane-label{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:7px 12px;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.6px;
  color:var(--text-muted);
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
.pane-label .dot{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  margin-right:6px;
}
.dot-html{background:var(--accent-warm);}
.dot-css{background:var(--accent);}
.reset-btn{
  background:none;border:1px solid var(--border);color:var(--text-muted);
  font-family:var(--mono);font-size:10.5px;padding:3px 8px;border-radius:5px;cursor:pointer;
}
.reset-btn:hover{color:var(--text);border-color:var(--accent-dim);}
.CodeMirror{
  flex:1;
  height:100% !important;
  font-family:var(--mono) !important;
  font-size:13px;
  background:#1e2039 !important;
}

/* ---------- Preview column ---------- */
.preview-col{
  display:flex;
  flex-direction:column;
  min-height:0;
}
.preview-wrap{
  flex:0 0 auto;
  height:46%;
  display:flex;
  justify-content:center;
  align-items:stretch;
  background:var(--surface);
  padding:14px;
  border-bottom:1px solid var(--border);
}
.preview-frame-shell{
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 0 0 1px var(--border), 0 12px 30px -12px rgba(0,0,0,.6);
  transition:width .15s ease;
  max-width:100%;
}
iframe{
  width:100%;height:100%;border:none;display:block;background:#fff;
}

.info-scroll{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:20px 24px 30px;
}
.eyebrow{
  font-family:var(--mono);
  font-size:11px;
  color:var(--accent);
  letter-spacing:1px;
  margin-bottom:6px;
}
.info-scroll h2{
  font-family:var(--display);
  font-size:22px;
  margin:0 0 10px;
}
.info-scroll p.lead{
  color:var(--text-muted);
  line-height:1.65;
  margin:0 0 16px;
  font-size:14px;
}
.tips{
  list-style:none;
  padding:0;
  margin:0 0 18px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.tips li{
  position:relative;
  padding-left:18px;
  font-size:13.5px;
  line-height:1.6;
  color:var(--text);
}
.tips li::before{
  content:"";
  position:absolute;left:0;top:8px;
  width:6px;height:6px;border-radius:50%;
  background:var(--accent-dim);
}
.tips li code{
  font-family:var(--mono);
  background:var(--surface-2);
  padding:1px 6px;
  border-radius:4px;
  color:var(--accent-warm);
  font-size:12.5px;
}
.challenge{
  border:1px dashed var(--accent-warm);
  background:rgba(255,184,107,.08);
  border-radius:10px;
  padding:12px 14px;
  font-size:13px;
  line-height:1.6;
  color:var(--text);
}
.challenge b{color:var(--accent-warm);font-family:var(--display);font-size:12.5px;letter-spacing:.4px;}

/* ---------- Box model visualizer ---------- */
#box-vis-wrap{margin-top:6px;}
#box-vis-wrap h3{
  font-family:var(--display);font-size:13px;color:var(--text-muted);
  letter-spacing:.4px;margin:0 0 10px;font-weight:500;
}
.vis-margin{
  border:1px dashed var(--accent-dim);
  border-radius:6px;
  display:inline-block;
  position:relative;
}
.vis-border{
  border:1px solid var(--accent);
  border-radius:4px;
  position:relative;
  background:rgba(124,158,255,.06);
}
.vis-padding{
  background:rgba(255,184,107,.12);
  position:relative;
  border-radius:2px;
}
.vis-content{
  background:var(--accent);
  color:#101127;
  font-family:var(--mono);
  font-size:10.5px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  border-radius:2px;
  min-width:30px;min-height:20px;
  line-height:1.3;
}
.vis-tag{
  position:absolute;top:-9px;left:6px;
  font-family:var(--mono);font-size:9.5px;
  background:var(--bg);padding:0 5px;
  color:var(--text-muted);
}
.vis-tag-margin{color:var(--accent-dim);}
.vis-tag-border{color:var(--accent);}
.vis-tag-padding{color:var(--accent-warm);}
.vis-empty{color:var(--text-muted);font-size:12.5px;font-family:var(--mono);}

::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:6px;}
::-webkit-scrollbar-track{background:transparent;}
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="cascade-mark"><span></span><span></span><span></span></div>
    <div class="brand"><b>CSS 工作台</b><small>邊改邊看，一步步練出手感</small></div>
    <div class="header-spacer"></div>
    <div class="width-control">
      <span>預覽寬度</span>
      <input type="range" id="width-slider" min="320" max="900" value="900">
      <b id="width-label">900px</b>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-title">練習主題</div>
      <div id="lesson-list"></div>
    </aside>

    <section class="editor-col">
      <div class="editor-pane">
        <div class="pane-label">
          <span><span class="dot dot-html"></span>HTML</span>
          <button class="reset-btn" id="reset-html">重置</button>
        </div>
        <textarea id="html-editor"></textarea>
      </div>
      <div class="editor-pane">
        <div class="pane-label">
          <span><span class="dot dot-css"></span>CSS</span>
          <button class="reset-btn" id="reset-css">重置</button>
        </div>
        <textarea id="css-editor"></textarea>
      </div>
    </section>

    <section class="preview-col">
      <div class="preview-wrap">
        <div class="preview-frame-shell" id="frame-shell" style="width:900px;">
          <iframe id="preview" title="即時預覽"></iframe>
        </div>
      </div>
      <div class="info-scroll">
        <div class="eyebrow" id="lesson-eyebrow"></div>
        <h2 id="lesson-title"></h2>
        <p class="lead" id="lesson-intro"></p>
        <ul class="tips" id="lesson-tips"></ul>
        <div class="challenge"><b>試試看</b><br><span id="lesson-challenge"></span></div>
        <div id="box-vis-wrap" style="display:none;">
          <h3>盒模型即時視覺化（讀取 .box 的設定）</h3>
          <div id="box-vis"></div>
        </div>
      </div>
    </section>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>

<script>
const lessons = [
  {
    id:"selectors",
    title:"選擇器基礎",
    intro:"選擇器決定「這條規則要套用在哪裡」。從最基本的元素、class、id，到會依狀態變化的偽類，是寫 CSS 的第一步。",
    tips:[
      "元素選擇器 <code>p</code> 會套用到所有該標籤",
      "class 用 <code>.btn</code>、id 用 <code>#id</code>，class 可重複使用、id 只能用一次",
      "後代選擇器 <code>.card p</code> 只選 .card 裡面的 p",
      "偽類 <code>:hover</code>、<code>:first-child</code> 會依狀態或位置套用樣式"
    ],
    challenge:"把第二個 &lt;p&gt; 換個顏色，只用 :nth-child(2) 選出它，不要加 class。",
    html:
`<div class="card">
  <h2 class="title">選擇器練習</h2>
  <p class="lead">這是第一段文字</p>
  <p>這是第二段文字</p>
  <button class="btn">一般按鈕</button>
  <button class="btn special">特別按鈕</button>
</div>`,
    css:
`.card {
  padding: 24px;
  font-family: sans-serif;
}
.title {
  color: #4a5dc7;
}
p {
  color: #555;
}
.lead {
  font-weight: 700;
}
.btn {
  padding: 8px 16px;
  margin-top: 8px;
  border: none;
  border-radius: 6px;
  background: #ddd;
  cursor: pointer;
}
.btn:hover {
  background: #bbb;
}
.special {
  background: #ffb86b;
}`
  },
  {
    id:"box-model",
    title:"盒模型 Box Model",
    intro:"每個元素都是一個盒子，由內而外是 content、padding、border、margin。理解這四層，版面的間距問題就解了一半。",
    tips:[
      "<code>padding</code> 是內容和邊框之間的空間，會撐大盒子",
      "<code>border</code> 是邊框本身的粗細",
      "<code>margin</code> 是盒子跟外面其他元素的距離，不會有背景色",
      "加上 <code>box-sizing: border-box</code> 可以讓 width/height 包含 padding 和 border，比較好算"
    ],
    challenge:"把 padding 改成 40px，觀察右邊的圖解怎麼跟著長大；再試著加一行 box-sizing: border-box。",
    html:`<div class="box">盒子</div>`,
    css:
`.box {
  width: 160px;
  height: 80px;
  padding: 20px;
  border: 4px solid #4a5dc7;
  margin: 30px;
  background: #eef1ff;
  color: #333;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: sans-serif;
}`
  },
  {
    id:"flexbox",
    title:"Flexbox 排版",
    intro:"Flexbox 是一維排版工具，很適合處理「一排」或「一欄」的對齊與分配空間，是最常用的排版方式之一。",
    tips:[
      "父層加 <code>display: flex</code>，子項目就會排成一列",
      "<code>justify-content</code> 控制主軸（通常是水平）的對齊",
      "<code>align-items</code> 控制交叉軸（通常是垂直）的對齊",
      "<code>gap</code> 用來控制項目之間的間距，不用再靠 margin 硬湊"
    ],
    challenge:"把 justify-content 改成 space-between，再改成 flex-end，感受差異。",
    html:
`<div class="flex-row">
  <div class="item">1</div>
  <div class="item">2</div>
  <div class="item">3</div>
</div>`,
    css:
`.flex-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  align-items: center;
  height: 160px;
  background: #f4f5fb;
}
.item {
  width: 60px;
  height: 60px;
  background: #4a5dc7;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  font-weight: 700;
  font-family: sans-serif;
}`
  },
  {
    id:"grid",
    title:"Grid 網格系統",
    intro:"Grid 是二維排版工具，可以同時控制列跟欄，很適合做整體版面骨架，例如卡片牆或頁面框架。",
    tips:[
      "<code>grid-template-columns: repeat(3, 1fr)</code> 建立三個等寬欄位",
      "<code>gap</code> 一樣可以控制格子間距",
      "<code>grid-column: span 2</code> 可以讓某一格橫跨兩欄",
      "Grid 適合整體骨架，Flexbox 適合單一排列，兩者常常搭配使用"
    ],
    challenge:"讓其中一個 .cell 加上 grid-column: span 2，看它怎麼撐大。",
    html:
`<div class="grid">
  <div class="cell">A</div>
  <div class="cell">B</div>
  <div class="cell">C</div>
  <div class="cell">D</div>
  <div class="cell">E</div>
  <div class="cell">F</div>
</div>`,
    css:
`.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  font-family: sans-serif;
}
.cell {
  background: #eef1ff;
  color: #333;
  padding: 20px;
  text-align: center;
  border-radius: 6px;
  font-weight: 600;
}`
  },
  {
    id:"position",
    title:"定位 Position",
    intro:"position 決定元素怎麼脫離或留在原本的文件流裡。static、relative、absolute、fixed 各自的行為不太一樣，很多人一開始會搞混。",
    tips:[
      "<code>static</code> 是預設值，不吃 top/left 這些偏移屬性",
      "<code>relative</code> 會相對「自己原本的位置」偏移，且不影響其他元素",
      "<code>absolute</code> 會相對「最近的 relative/absolute 祖先」定位，需要小心跟 relative 搭配",
      "<code>fixed</code> 相對瀏覽器視窗，滾動頁面也不會動"
    ],
    challenge:"把 .absolute 的 bottom/right 改成 top/left，看它跳去哪個角落。",
    html:
`<div class="stage">
  <div class="box relative">relative</div>
  <div class="box absolute">absolute</div>
  <div class="box static">static</div>
</div>`,
    css:
`.stage {
  position: relative;
  height: 220px;
  border: 2px dashed #4a5dc7;
  font-family: sans-serif;
}
.box {
  padding: 10px;
  color: #fff;
  border-radius: 6px;
  width: 100px;
  text-align: center;
  font-size: 13px;
}
.relative {
  position: relative;
  top: 10px;
  left: 10px;
  background: #4a5dc7;
}
.absolute {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: #d98a3e;
}
.static {
  background: #888;
}`
  },
  {
    id:"color-gradient",
    title:"色彩與漸層",
    intro:"CSS 的顏色不只是單色填色，rgba、漸層都能讓畫面更有層次，是視覺設計中很常用的技巧。",
    tips:[
      "顏色可以用 <code>#hex</code>、<code>rgb()</code>、<code>rgba()</code> 表示，rgba 多一個透明度",
      "<code>linear-gradient(角度, 顏色1, 顏色2)</code> 建立線性漸層",
      "角度 <code>135deg</code> 代表從左上到右下漸變",
      "也可以用 <code>radial-gradient()</code> 做出放射狀的漸層"
    ],
    challenge:"把角度從 135deg 改成 90deg，再加第三種顏色進漸層裡。",
    html:`<div class="panel"></div>`,
    css:
`.panel {
  height: 180px;
  border-radius: 12px;
  background: linear-gradient(135deg, #4a5dc7, #ffb86b);
}`
  },
  {
    id:"typography",
    title:"文字排版",
    intro:"字型、行高、字距這些細節，決定一段文字讀起來舒不舒服，是很容易被忽略但影響很大的地方。",
    tips:[
      "<code>line-height</code> 建議設 1.4～1.8 之間，太擠或太鬆都不好讀",
      "<code>letter-spacing</code> 微調字距，標題常用來拉開一點",
      "<code>font-weight</code> 控制粗細，不是所有字型都有每個粗細",
      "中文排版建議搭配 <code>font-family</code> 提供多個備援字型"
    ],
    challenge:"把 line-height 改成 1，感受一下閱讀起來的差別，再改回 1.7。",
    html:
`<article class="post">
  <h1>標題文字示範</h1>
  <p>這是一段內文，用來示範字距、行高與字重帶來的閱讀感受差異，試著調整下面的數值看看效果。</p>

let current = lessons[0];
let htmlEditor, cssEditor, previewTimer;

function initEditors(){
  htmlEditor = CodeMirror.fromTextArea(document.getElementById('html-editor'), {
    mode:'htmlmixed', theme:'dracula', lineNumbers:true, tabSize:2, viewportMargin:Infinity
  });
  cssEditor = CodeMirror.fromTextArea(document.getElementById('css-editor'), {
    mode:'css', theme:'dracula', lineNumbers:true, tabSize:2, viewportMargin:Infinity
  });
  htmlEditor.on('change', scheduleUpdate);
  cssEditor.on('change', scheduleUpdate);
}

function scheduleUpdate(){
  clearTimeout(previewTimer);
  previewTimer = setTimeout(()=>{
    updatePreview();
    if(current.id === 'box-model') updateBoxVis();
  }, 220);
}

function updatePreview(){
  const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
    *{box-sizing:border-box;}
    body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;margin:0;padding:24px;background:#ffffff;color:#222;}
    ${cssEditor.getValue()}
  </style></head><body>${htmlEditor.getValue()}</body></html>`;
  document.getElementById('preview').srcdoc = doc;
}

function updateBoxVis(){
  const css = cssEditor.getValue();
  const match = css.match(/\.box\s*{([^}]*)}/);
  const vis = document.getElementById('box-vis');
  if(!match){
    vis.innerHTML = '<p class="vis-empty">找不到 .box 規則，先在 CSS 裡加一個 .box 試試</p>';
    return;
  }
  const block = match[1];
  const get = (re, def) => { const m = block.match(re); return m ? parseFloat(m[1]) : def; };
  const width   = get(/width:\s*([\d.]+)px/, 100);
  const height  = get(/height:\s*([\d.]+)px/, 60);
  const padding = get(/padding:\s*([\d.]+)px/, 0);
  const border  = get(/border(?:-width)?:\s*([\d.]+)px/, 0);
  const margin  = get(/margin:\s*([\d.]+)px/, 0);

  const mClamp = Math.min(margin, 40);
  const bClamp = Math.min(border, 16);
  const pClamp = Math.min(padding, 40);
  const wClamp = Math.min(width, 200);
  const hClamp = Math.min(height, 110);

  vis.innerHTML = `
    <div class="vis-margin" style="padding:${mClamp}px">
      <span class="vis-tag vis-tag-margin">margin ${margin}px</span>
      <div class="vis-border" style="padding:${bClamp}px">
        <span class="vis-tag vis-tag-border">border ${border}px</span>
        <div class="vis-padding" style="padding:${pClamp}px">
          <span class="vis-tag vis-tag-padding">padding ${padding}px</span>
          <div class="vis-content" style="width:${wClamp}px;height:${hClamp}px">content<br>${width}×${height}</div>
        </div>
      </div>
    </div>`;
}

function renderSidebar(){
  const list = document.getElementById('lesson-list');
  list.innerHTML = '';
  lessons.forEach((l, i)=>{
    const btn = document.createElement('button');
    btn.className = 'lesson-btn' + (l.id === current.id ? ' active' : '');
    btn.innerHTML = `<span class="num">${String(i+1).padStart(2,'0')}</span>${l.title}`;
    btn.onclick = ()=> loadLesson(l.id);
    btn.dataset.id = l.id;
    list.appendChild(btn);
  });
}

function loadLesson(id){
  current = lessons.find(l => l.id === id);
  htmlEditor.setValue(current.html);
  cssEditor.setValue(current.css);

  document.getElementById('lesson-eyebrow').textContent = `主題 ${lessons.indexOf(current)+1} / ${lessons.length}`;
  document.getElementById('lesson-title').textContent = current.title;
  document.getElementById('lesson-intro').textContent = current.intro;
  document.getElementById('lesson-tips').innerHTML = current.tips.map(t=>`<li>${t}</li>`).join('');
  document.getElementById('lesson-challenge').innerHTML = current.challenge;

  document.querySelectorAll('.lesson-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.id === id);
  });

  document.getElementById('box-vis-wrap').style.display = (id === 'box-model') ? 'block' : 'none';

  updatePreview();
  if(id === 'box-model') updateBoxVis();
}

document.getElementById('reset-html').onclick = ()=> { htmlEditor.setValue(current.html); scheduleUpdate(); };
document.getElementById('reset-css').onclick  = ()=> { cssEditor.setValue(current.css); scheduleUpdate(); };

const slider = document.getElementById('width-slider');
const shell = document.getElementById('frame-shell');
const widthLabel = document.getElementById('width-label');
slider.addEventListener('input', ()=>{
  shell.style.width = slider.value + 'px';
  widthLabel.textContent = slider.value + 'px';
});

initEditors();
renderSidebar();
loadLesson(current.id);
</script>
</body>
